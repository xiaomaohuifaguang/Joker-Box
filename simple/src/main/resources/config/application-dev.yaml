            redirect-uri: "${custom.page-server}/joker-box/sso/oauth2/code/github"
            authorization-grant-type: authorization_code
            client-name: GitHub
          gitee:
            client-id: a2b44ec2e3c6016418b74c2edd5e39ad28fc075148d70836821c26df2b998c16

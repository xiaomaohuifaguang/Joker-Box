server:
  port: 8100
  servlet:
    context-path: /joker-box

spring:
  application:
    name: joker-box
  web:
    resources:
      add-mappings: false
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${custom.database.url}
    username: ${custom.database.username}
    password: ${custom.database.password}
  sql:
    init:
      mode: always
      data-locations: classpath:/sql/init.sql
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: Ov23linJJ3I3ZERrbz68
            client-secret: 2df6e66572b92226156c15d14331575fe3674237
            scope: user
            redirect-uri: "${custom.page-server}/joker-box/sso/oauth2/code/github"
            authorization-grant-type: authorization_code
            client-name: GitHub
          gitee:
            client-id: a2b44ec2e3c6016418b74c2edd5e39ad28fc075148d70836821c26df2b998c16
            client-secret: 9bdfe2e7ceb7174c40fd8e1cc4fc58d086b730c6402913c7f08c2ed471914062
            scope: user_info
            redirect-uri: "${custom.page-server}/joker-box/sso/oauth2/code/gitee"
            authorization-grant-type: authorization_code
            client-name: Gitee
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
          gitee:
            authorization-uri: https://gitee.com/oauth/authorize
            token-uri: https://gitee.com/oauth/token
            user-info-uri: https://gitee.com/api/v5/user
            user-name-attribute: login  # 设置用户名字段为 'login'
  data:
    redis:
      host: ${custom.redis.host}
      port: ${custom.redis.port}
      password: ${custom.redis.password}
      database: ${custom.redis.database}
  kafka:
    # ========== Broker 地址 ==========
    bootstrap-servers: 192.168.3.35:32003  # 你的 Kafka NodePort 地址

    # ========== Producer 配置 ==========
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                           # 确保消息写入所有副本
      retries: 3                          # 发送失败重试次数
      batch-size: 16384                   # 批量发送大小（字节）
      buffer-memory: 33554432             # 生产者缓冲区大小（字节）
      bootstrap-servers: 192.168.3.35:32003

    # ========== Consumer 配置 ==========
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: my-consumer-group         # 消费者组ID
      auto-offset-reset: earliest         # 无偏移量时从最早的消息开始
      enable-auto-commit: false           # 关闭自动提交Offset（建议手动提交）
      max-poll-records: 500               # 单次拉取最大消息数
      fetch-max-wait: 500ms
      bootstrap-servers: 192.168.3.35:32003

    # ========== Listener 配置（@KafkaListener） ==========
    listener:
      ack-mode: manual                    # 手动提交Offset
      concurrency: 3                      # 消费者并发数（建议 <= Topic分区数）
  mail:
    host: smtp.163.com
    port: 465
    username: ${custom.mail.username}
    password: ${custom.mail.password}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.163.com

mybatis-plus:
  mapper-locations: classpath:/mapper/**.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #开启sql日志

# knife4j 配置
knife4j:
  enable: true
  basic:
    enable: true
    username: ${custom.knife4j.username}
    password: ${custom.knife4j.password}
  setting:
    language: zh_cn
    enable-home-custom: true
    home-custom-path: classpath:doc/home.md
    # 开启动态请求参数，true-开启，false-关闭
    enable-dynamic-parameter: true


